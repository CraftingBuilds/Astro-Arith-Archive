layout: default
title: Astrology Arith(m)etic
show_home: true
---

<main id="content">
  <h2>Loading Section...</h2>
  <p>Please wait while the content loads.</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  function encodePath(path) {
    return path
      .split('/')
      .map(encodeURIComponent)
      .join('/');
  }

  const params = new URLSearchParams(window.location.search);
  const section = params.get('section') ? decodeURIComponent(params.get('section')) : '';
  const titleMap = {
    'analysis-guidelines': 'Analysis Guidelines',
    'building-blocks': 'Building Blocks',
    'complete-astrology': 'Complete Astrology',
    'interpretation': 'Interpretation',
    'legal': 'Legal'
  };

  const title = titleMap[section] || section.split('/').pop() || 'Astrology Section';
  document.querySelector('h2').innerText = title;

  const sectionPath = section ? encodePath(section) + '/' : '';

  fetch(`../sections/${sectionPath}index.md`)
    .then(res => res.text())
    .then(md => {
      const container = document.getElementById('content');
      container.innerHTML = marked.parse(md);
      container.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (!href || href.startsWith('http') || href.startsWith('#')) return;
        const target = section ? `${section}/${href}` : href;
        a.setAttribute('href', `${location.pathname}?section=${encodePath(target)}`);
      });
    })
    .catch(err => {
      document.getElementById('content').innerHTML = `<p>Error loading content: ${err.message}</p>`;
    });
</script>
