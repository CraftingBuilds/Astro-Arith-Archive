<main id="content">
  <h2>Loading Section...</h2>
  <p>Please wait while the content loads.</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const section = new URLSearchParams(window.location.search).get('section') || '';
  const titleMap = {
    'analysis-guidelines': 'Analysis Guidelines',
    'building-blocks': 'Building Blocks',
    'complete-astrology': 'Complete Astrology',
    'interpretation': 'Interpretation',
    'legal': 'Legal'
  };

  document.querySelector('h2').innerText = titleMap[section] || 'Astrology Section';

  fetch(`../sections/${section}/index.md`)
    .then(res => res.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
    })
    .catch(err => {
      document.getElementById('content').innerHTML = `<p>Error loading content: ${err.message}</p>`;
    });
</script>
