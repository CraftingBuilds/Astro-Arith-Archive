<!DOCTYPE html>
<html lang=“en”>
<head>
  <meta charset=“UTF-8” />
  <meta name=“viewport” content=“width=device-width, initial-scale=1.0”/>
  <title>Astrology Arith(m)etic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1f3b75; /* Starseed Blue */
      color: white;
      font-family: ‘Segoe UI’, Tahoma, Geneva, Verdana, sans-serif;
    }

    header {
      margin-top: 2rem;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 1rem 2rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header h1 {
      color: white;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    nav {
      margin-top: 0.5rem;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav ul li a {
      color: #a8d8ff;
      text-decoration: none;
      font-weight: bold;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    main {
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }

    p {
      text-align: center;
      line-height: 1.6;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Astrology Arith(m)etic</h1>
    <nav>
      <ul>
        <li><a href=“../index.html”>🏠 Home</a></li>
        <li><a href=“page.html?section=analysis-guidelines”>Analysis Guidelines</a></li>
        <li><a href=“page.html?section=building-blocks”>Building Blocks</a></li>
        <li><a href=“page.html?section=complete-astrology”>Complete Astrology</a></li>
        <li><a href=“page.html?section=interpretation”>Interpretation</a></li>
        <li><a href=“page.html?section=legal”>Legal</a></li>
      </ul>
    </nav>
  </header>

  <main id=“content”>
    <h2>Loading Section...</h2>
    <p>Please wait while the content loads.</p>
  </main>

  <script src=“https://cdn.jsdelivr.net/npm/marked/marked.min.js”></script>
  <script>
    const section = new URLSearchParams(window.location.search).get(‘section’) || ‘’;
    const titleMap = {
      “analysis-guidelines”: “Analysis Guidelines”,
      “building-blocks”: “Building Blocks”,
      “complete-astrology”: “Complete Astrology”,
      “interpretation”: “Interpretation”,
      “legal”: “Legal”
    };

    document.querySelector(‘h2’).innerText = titleMap[section] || ‘Astrology Section’;

    fetch(`../sections/${section}/index.md`)
      .then(res => res.text())
      .then(md => {
        document.getElementById(‘content’).innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById(‘content’).innerHTML = `<p>Error loading content: ${err.message}</p>`;
      });
  </script>
</body>
</html>
