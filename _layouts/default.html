<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1f3b75; /* Starseed Blue */
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    header {
      margin-top: 2rem;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 1rem 2rem 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    header h1 {
      color: white;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    nav {
      margin-top: 0.5rem;
    }
    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    nav ul li a {
      color: #a8d8ff;
      text-decoration: none;
      font-weight: bold;
    }
    nav ul li a:hover {
      text-decoration: underline;
    }
    section.intro {
      text-align: center;
      padding: 1rem 2rem 0.5rem;
    }
    main {
      padding: 0 2rem 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    h2 {
      margin-top: 2rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    p {
      margin-bottom: 1rem;
      line-height: 1.6;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ site.title }}</h1>
    {% include nav.html show_home=page.show_home %}
  </header>

  {{ content }}

</body>
</html>
